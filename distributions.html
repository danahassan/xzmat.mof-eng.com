<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distributions — XZMAT</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main">
    <header class="page-header">
      <div class="page-header__title-group">
        <button id="menu-toggle"><i class="fa-solid fa-bars" aria-hidden="true"></i></button>
        <h1><i class="fa-solid fa-boxes-stacked" aria-hidden="true" style="color:var(--primary);margin-right:8px"></i>Distributions</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-success" onclick="exportExcel()">
          <i class="fa-solid fa-file-excel" aria-hidden="true"></i> <span>Export Excel</span>
        </button>
        <button class="btn btn-primary" onclick="openForm()">
          <i class="fa-solid fa-plus" aria-hidden="true"></i> <span>Record Distribution</span>
        </button>
      </div>
    </header>
    <div class="page-content">
      <div class="stat-grid" id="stat-grid"></div>
      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <input type="text" id="search" placeholder="Search beneficiary, donor…" oninput="render()">
          </div>
          <select class="filter-select" id="type-filter" onchange="render()">
            <option value="">All Types</option>
          </select>
          <input type="date" id="from-date" onchange="render()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 12px;font-size:.875rem">
          <input type="date" id="to-date"   onchange="render()" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:8px 12px;font-size:.875rem">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Beneficiary</th><th>Support Type</th>
                <th class="col-hide-mobile">Qty</th><th>Value (IQD)</th><th class="col-hide-mobile">Donor</th><th class="col-hide-mobile">Recorded By</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="pagination"></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script src="js/distributions.js"></script>
</body>
</html>
