<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XZMAT — Sign In</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-brand">
      <div class="logo"><i class="fa-solid fa-hand-holding-heart"></i></div>
      <h1>XZMAT Portal</h1>
      <p>Social Support Management System</p>
    </div>
    <div class="login-card">
      <div class="login-error" id="login-error"><i class="fa-solid fa-circle-xmark"></i> Invalid username or password.</div>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">
        <i class="fa-solid fa-right-to-bracket"></i> Sign In
      </button>
    </div>
    <p style="text-align:center;margin-top:20px;font-size:.8rem;color:var(--muted)">
      Sulaymaniyah · XZMAT Social Support Program
    </p>
  </div>
</div>
<script src="js/data.js"></script>
<script>
  /* Redirect if already logged in */
  if (authGetUser()) window.location.href = 'dashboard.html';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const user = userFind(username, password);
    if (!user) {
      document.getElementById('login-error').style.display = 'flex';
      return;
    }
    userUpdateLogin(user.id);
    authSetUser(user);
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
