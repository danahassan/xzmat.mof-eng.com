<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donations — XZMAT</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main">
    <header class="page-header">
      <div style="display:flex;align-items:center;gap:12px">
        <button id="menu-toggle"><i class="fa-solid fa-bars"></i></button>
        <h1><i class="fa-solid fa-hand-holding-dollar" style="color:var(--primary);margin-right:8px"></i>Donations</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-success" onclick="exportExcel()">
          <i class="fa-solid fa-file-excel"></i> <span>Export Excel</span>
        </button>
        <button class="btn btn-primary" onclick="openForm()">
          <i class="fa-solid fa-plus"></i> <span>Record Donation</span>
        </button>
      </div>
    </header>
    <div class="page-content">
      <div class="stat-grid" id="stat-grid"></div>
      <div class="card">
        <div class="toolbar">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="search" placeholder="Search donor, reference…" oninput="render()">
          </div>
          <select class="filter-select" id="method-filter" onchange="render()">
            <option value="">All Methods</option>
            <option value="cash">Cash</option>
            <option value="wallet">Mobile Wallet</option>
            <option value="bank">Bank Transfer</option>
            <option value="online">Online</option>
          </select>
          <select class="filter-select" id="status-filter" onchange="render()">
            <option value="">All Statuses</option>
            <option value="confirmed">Confirmed</option>
            <option value="pending">Pending</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th><th>Donor</th><th>Amount (IQD)</th>
                <th class="col-hide-mobile">Method</th><th class="col-hide-mobile">Reference</th><th class="col-hide-mobile">Purpose</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="pagination"></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script src="js/donations.js"></script>
</body>
</html>
