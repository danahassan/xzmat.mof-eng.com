<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08111e">
  <title>Payment Methods — XZMAT</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main">
    <header class="page-header">
      <div class="page-header__title-group">
        <button id="menu-toggle"><i class="fa-solid fa-bars" aria-hidden="true"></i></button>
        <h1><i class="fa-solid fa-wallet" aria-hidden="true" class="page-header__icon"></i>Payment Methods</h1>
      </div>
    </header>
    <div class="page-content">
      <!-- Mobile Wallets -->
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">
          <span class="card-title"><i class="fa-solid fa-mobile-screen" aria-hidden="true"></i> Mobile Wallets</span>
          <button class="btn btn-primary btn-sm" onclick="openWalletForm()">
            <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Wallet
          </button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Provider</th><th>Account Name</th><th>Number</th><th>Notes</th><th>Actions</th></tr></thead>
            <tbody id="wallet-table"></tbody>
          </table>
        </div>
      </div>

      <!-- Bank Accounts -->
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fa-solid fa-building-columns" aria-hidden="true"></i> Bank Accounts</span>
          <button class="btn btn-primary btn-sm" onclick="openBankForm()">
            <i class="fa-solid fa-plus" aria-hidden="true"></i> Add Account
          </button>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Bank</th><th>Account Name</th><th>IBAN / Number</th><th>Branch</th><th>Currency</th><th>Actions</th></tr></thead>
            <tbody id="bank-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container"></div>
<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script src="js/payments.js"></script>
</body>
</html>
