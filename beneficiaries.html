<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beneficiaries — XZMAT</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<a href="#main" class="skip-link">Skip to main content</a>
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main">
    <header class="page-header">
      <div class="page-header__title-group">
        <button id="menu-toggle"><i class="fa-solid fa-bars" aria-hidden="true"></i></button>
        <h1><i class="fa-solid fa-users" aria-hidden="true" style="color:var(--primary);margin-right:8px"></i>Beneficiaries</h1>
      </div>
      <div class="header-actions">
        <button class="btn btn-success" id="btn-export" aria-label="Export beneficiaries to Excel">
          <i class="fa-solid fa-file-excel" aria-hidden="true"></i> <span>Export Excel</span>
        </button>
        <button class="btn btn-primary" id="btn-add" aria-label="Add new beneficiary">
          <i class="fa-solid fa-plus" aria-hidden="true"></i> <span>Add Beneficiary</span>
        </button>
      </div>
    </header>
    <div class="page-content">
      <div class="stat-grid" id="stat-grid"></div>
      <div class="card">
        <div class="toolbar" role="search">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
            <label for="search" class="sr-only">Search beneficiaries</label>
            <input type="text" id="search" placeholder="Search name, phone, area…" aria-label="Search beneficiaries">
          </div>
          <label for="status-filter" class="sr-only">Filter by status</label>
          <select class="filter-select" id="status-filter" aria-label="Filter by status">
            <option value="">All Statuses</option>
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="inactive">Inactive</option>
          </select>
          <label for="area-filter" class="sr-only">Filter by area</label>
          <select class="filter-select" id="area-filter" aria-label="Filter by area">
            <option value="">All Areas</option>
          </select>
        </div>
        <div class="results-bar" id="results-bar" hidden>
          <span id="results-count" aria-live="polite"></span>
          <button type="button" class="btn-link" id="clear-filters" hidden>Clear filters</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col" class="col-hide-mobile">#</th>
                <th scope="col">Name</th>
                <th scope="col">Phone</th>
                <th scope="col" class="col-hide-mobile">Area</th>
                <th scope="col" class="col-hide-mobile">Family</th>
                <th scope="col" class="col-hide-mobile">Income (IQD)</th>
                <th scope="col">Status</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
        <div id="pagination"></div>
      </div>
    </div>
  </main>
</div>
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>
<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script src="js/beneficiaries.js"></script>
</body>
</html>
