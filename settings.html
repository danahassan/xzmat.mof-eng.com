<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08111e">
  <title>Settings — XZMAT</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div id="app">
  <aside id="sidebar"></aside>
  <main id="main">
    <header class="page-header">
      <div class="page-header__title-group">
        <button id="menu-toggle"><i class="fa-solid fa-bars" aria-hidden="true"></i></button>
        <h1><i class="fa-solid fa-gear" aria-hidden="true" class="page-header__icon"></i>Settings</h1>
      </div>
    </header>
    <div class="page-content">
      <div class="two-col">
        <!-- Organization Settings -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="fa-solid fa-building" aria-hidden="true"></i> Organization</span>
          </div>
          <form id="org-form">
            <div class="form-group">
              <label>Organization Name</label>
              <input type="text" name="orgName" id="orgName">
            </div>
            <div class="form-group">
              <label>Portal Domain</label>
              <input type="text" name="domain" id="domain">
            </div>
            <div class="form-group">
              <label>Contact Email</label>
              <input type="email" name="email" id="email">
            </div>
            <div class="form-group">
              <label>Currency</label>
              <select name="currency" id="currency">
                <option value="IQD">IQD — Iraqi Dinar</option>
                <option value="USD">USD — US Dollar</option>
              </select>
            </div>
            <button type="button" class="btn btn-primary" onclick="saveOrg()">
              <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> Save Changes
            </button>
          </form>
        </div>

        <!-- User Accounts -->
        <div class="card">
          <div class="card-header">
            <span class="card-title"><i class="fa-solid fa-users-gear" aria-hidden="true"></i> User Accounts</span>
            <button class="btn btn-primary btn-sm" id="btn-add-user" type="button">
              <i class="fa-solid fa-user-plus" aria-hidden="true"></i> Add User
            </button>
          </div>
          <div id="user-list"></div>
          <hr class="divider">
          <div class="card-header" style="margin-bottom:0">
            <span class="card-title" style="font-size:.85rem">Data Management</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px">
            <button class="btn btn-ghost" onclick="resetData()">
              <i class="fa-solid fa-rotate-left text-warning" aria-hidden="true"></i> Reset to Seed Data
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- User add/edit modal -->
<div class="modal-backdrop" id="user-modal" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="user-modal-title">
    <div class="modal-header">
      <h3 id="user-modal-title">Add User</h3>
      <button class="modal-close" type="button" aria-label="Close" onclick="closeModal('user-modal')">&times;</button>
    </div>
    <form id="user-form" onsubmit="event.preventDefault(); saveUser();">
      <div class="modal-body">
        <input type="hidden" id="u-id">
        <div class="form-group">
          <label for="u-name">Full Name *</label>
          <input type="text" id="u-name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="u-username">Username *</label>
          <input type="text" id="u-username" required autocomplete="username" pattern="[a-zA-Z0-9_.-]{3,}" title="Letters, numbers, dot, dash, underscore — min 3 chars">
        </div>
        <div class="form-group">
          <label for="u-role">Role *</label>
          <select id="u-role" required>
            <option value="supervisor">Supervisor</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
        <div class="form-group">
          <label for="u-password"><span id="u-password-label">Password *</span></label>
          <div class="input-with-action">
            <input type="password" id="u-password" autocomplete="new-password" minlength="6">
            <button type="button" class="input-action" id="u-password-toggle" aria-label="Show password" aria-pressed="false">
              <i class="fa-solid fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <small class="text-muted" id="u-password-hint">At least 6 characters.</small>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('user-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary">
          <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> Save
        </button>
      </div>
    </form>
  </div>
</div>
<div id="toast-container"></div>
<script src="js/data.js"></script>
<script src="js/shared.js"></script>
<script src="js/settings.js"></script>
</body>
</html>
